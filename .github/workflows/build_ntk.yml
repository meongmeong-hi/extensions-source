name: Build NTK Only

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Copy Working Setup from Another Extension
        run: |
          # 1. 기존의 에러를 유발하던 낡은 설정 파일들을 전부 휴지통에 버립니다.
          rm -f src/ko/ntk/build.gradle
          rm -f common.gradle
          rm -f src/ko/ntk/src/main/AndroidManifest.xml
          
          # 2. 저장소 내에서 완벽하게 빌드되고 있는 다른 한국어 확장팩의 설정 파일을 찾습니다.
          TEMPLATE=$(find src/ko -mindepth 2 -maxdepth 2 -name "build.gradle.kts" | grep -v "ntk" | head -n 1)
          if [ -z "$TEMPLATE" ]; then
            TEMPLATE=$(find src -mindepth 3 -maxdepth 3 -name "build.gradle.kts" | grep -v "ntk" | head -n 1)
          fi
          echo "완벽하게 작동 중인 원본 파일: $TEMPLATE"
          
          # 3. NTK 폴더로 그대로 복사해옵니다. (이제 타치요미 필수 부품들이 모두 연결됩니다)
          cp "$TEMPLATE" "src/ko/ntk/build.gradle.kts"
          
          # 4. 원본 파일의 이름표만 'NTK'로 싹 바꿔치기 합니다.
          sed -i -E 's/(extName|name)\s*=\s*".*"/\1 = "NTK"/' src/ko/ntk/build.gradle.kts
          sed -i -E 's/pkgNameSuffix\s*=\s*".*"/pkgNameSuffix = "ko.ntk"/' src/ko/ntk/build.gradle.kts
          sed -i -E 's/(extClass|className)\s*=\s*".*"/\1 = ".NTKFactory"/' src/ko/ntk/build.gradle.kts
          sed -i -E 's/(extVersionCode|versionCode)\s*=\s*[0-9]+/\1 = 1/' src/ko/ntk/build.gradle.kts
          
          echo "바꿔치기 완료된 NTK 전용 설정:"
          cat src/ko/ntk/build.gradle.kts

      - name: Build NTK Debug APK
        run: ./gradlew :src:ko:ntk:assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ntk-plugin-apk
          path: "**/*.apk"
