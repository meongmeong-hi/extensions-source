name: Build NTK Only

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Clone Native Working Config
        run: |
          # 1. 완벽히 성공했던 mundohentai의 설정 파일을 그대로 복사해옵니다.
          if [ -f "src/pt/mundohentai/build.gradle" ]; then
            TEMPLATE="src/pt/mundohentai/build.gradle"
          elif [ -f "src/pt/mundohentai/build.gradle.kts" ]; then
            TEMPLATE="src/pt/mundohentai/build.gradle.kts"
          else
            TEMPLATE=$(find src -mindepth 3 -maxdepth 3 -name "build.gradle*" | grep -v "ntk" | head -n 1)
          fi
          
          EXT=${TEMPLATE#*build.}
          TARGET="src/ko/ntk/build.$EXT"
          
          # 기존의 고장 난 파일은 날려버리고 정상 파일을 덮어씁니다.
          rm -f src/ko/ntk/build.gradle*
          cp "$TEMPLATE" "$TARGET"
          
          # 2. 내용물의 이름표를 정교하게 NTK로 위조(?)합니다.
          sed -i -E "s/extName\s*=\s*['\"].*['\"]/extName = \"NTK\"/g" "$TARGET"
          sed -i -E "s/pkgNameSuffix\s*=\s*['\"].*['\"]/pkgNameSuffix = \"ko.ntk\"/g" "$TARGET"
          sed -i -E "s/extClass\s*=\s*['\"].*['\"]/extClass = \".NTKFactory\"/g" "$TARGET"
          sed -i -E "s/extVersionCode\s*=\s*[0-9]+/extVersionCode = 1/g" "$TARGET"
          
          # 3. 필수 신분증(Manifest) 파일도 확실하게 챙겨 넣습니다.
          mkdir -p src/ko/ntk/src/main
          cat << 'EOF' > src/ko/ntk/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="NTK">
                  <meta-data android:name="tachiyomi.extension" android:value="true" />
                  <meta-data android:name="tachiyomi.extension.class" android:value="eu.kanade.tachiyomi.extension.ko.ntk.NTKFactory" />
                  <meta-data android:name="tachiyomi.extension.versionCode" android:value="1" />
                  <meta-data android:name="tachiyomi.extension.versionName" android:value="1.0" />
              </application>
          </manifest>
          EOF

      - name: Build NTK Debug APK
        run: ./gradlew :src:ko:ntk:assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ntk-plugin-apk
          path: "**/*.apk"
