name: Build NTK Only

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Upgrade NTK to Modern Build System
        run: |
          # 1. 기존 파일에서 핵심 부품(dependencies)만 안전하게 빼둡니다.
          sed -n '/dependencies {/,/}/p' src/ko/ntk/build.gradle > deps.txt || true
          
          # 2. 에러를 일으키던 옛날 방식의 파일들을 전부 폐기합니다.
          rm -f src/ko/ntk/build.gradle
          rm -f common.gradle
          rm -f src/ko/ntk/src/main/AndroidManifest.xml
          
          # 3. 최신 공장 규칙에 맞는 깔끔한 새 설정 파일을 만듭니다.
          cat << 'EOF' > src/ko/ntk/build.gradle
          plugins {
              id 'tachiyomi.extension'
          }

          tachiyomi {
              extName = 'NTK'
              pkgNameSuffix = 'ko.ntk'
              extClass = '.NTKFactory'
              extVersionCode = 1
              isNsfw = false
          }
          EOF
          
          # 4. 아까 빼둔 핵심 부품들을 새 파일에 조립합니다.
          if [ -s deps.txt ]; then
            cat deps.txt >> src/ko/ntk/build.gradle
          fi
          
          echo "✅ 최신 시스템 업그레이드 완료"

      - name: Build NTK Debug APK
        run: ./gradlew :src:ko:ntk:assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ntk-plugin-apk
          path: "**/*.apk"
