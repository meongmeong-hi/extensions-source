name: Build NTK Only

on:
  workflow_dispatch: # 수동 실행 버튼 활성화

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      # 검증된 공식 활성 저장소에서 누락된 빌드 필수 파일을 강제로 다운로드합니다.
      - name: Fetch Missing common.gradle
        run: |
          curl -sL https://raw.githubusercontent.com/cuong-tran/keiyoushi-extensions/main/common.gradle -o common.gradle

      - name: Build NTK Debug APK
        run: ./gradlew :src:ko:ntk:assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ntk-plugin-apk
          path: "**/*.apk"
