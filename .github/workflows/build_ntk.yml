name: Build NTK Only

on:
  workflow_dispatch: # 수동 실행 버튼 활성화

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      # 오류를 뿜어내던 복잡한 최적화 코드를 전부 걷어내고, 빌드에 꼭 필요한 뼈대만 갖춘 설정을 실시간으로 만듭니다.
      - name: Create Clean common.gradle
        run: |
          cat << 'EOF' > common.gradle
          apply plugin: 'com.android.application'
          apply plugin: 'kotlin-android'
          apply plugin: 'kotlinx-serialization'

          android {
              compileSdk 34
              defaultConfig {
                  minSdk 21
                  targetSdk 34
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }

          repositories {
              google()
              mavenCentral()
          }
          EOF

      - name: Build NTK Debug APK
        run: ./gradlew :src:ko:ntk:assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ntk-plugin-apk
          path: "**/*.apk"
