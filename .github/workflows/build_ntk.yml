name: Build NTK Only

on:
  workflow_dispatch: # 수동 실행 버튼 활성화

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      # 1. 뼈대 설정 및 2. 필수 앱 서류(Manifest)를 실시간으로 위조(?)하여 꽂아 넣습니다.
      - name: Fix Build Files and Create common.gradle
        run: |
          if [ -f src/ko/ntk/build.gradle ]; then
            sed -i '/kotlin-android/d' src/ko/ntk/build.gradle
            sed -i '/org.jetbrains.kotlin.android/d' src/ko/ntk/build.gradle
          fi

          cat << 'EOF' > common.gradle
          apply plugin: 'com.android.application'
          apply plugin: 'kotlinx-serialization'

          android {
              namespace 'eu.kanade.tachiyomi.extension.ko.ntk'
              compileSdk 34
              defaultConfig {
                  minSdk 21
                  targetSdk 34
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          EOF

          mkdir -p src/ko/ntk/src/main
          cat << 'EOF' > src/ko/ntk/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="NTK">
                  <meta-data android:name="tachiyomi.extension" android:value="true" />
                  <meta-data android:name="tachiyomi.extension.class" android:value="eu.kanade.tachiyomi.extension.ko.ntk.NTKFactory" />
                  <meta-data android:name="tachiyomi.extension.versionCode" android:value="1" />
                  <meta-data android:name="tachiyomi.extension.versionName" android:value="1.0" />
              </application>
          </manifest>
          EOF

      - name: Build NTK Debug APK
        run: ./gradlew :src:ko:ntk:assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ntk-plugin-apk
          path: "**/*.apk"
