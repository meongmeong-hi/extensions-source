name: Build NTK Only

on:
  workflow_dispatch: # 수동 실행 버튼 활성화

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      # 시스템이 요구하는 명찰(namespace)을 포함한 완벽한 뼈대를 생성합니다.
      - name: Fix Build Files and Create common.gradle
        run: |
          if [ -f src/ko/ntk/build.gradle ]; then
            sed -i '/kotlin-android/d' src/ko/ntk/build.gradle
            sed -i '/org.jetbrains.kotlin.android/d' src/ko/ntk/build.gradle
          fi

          cat << 'EOF' > common.gradle
          apply plugin: 'com.android.application'
          apply plugin: 'kotlinx-serialization'

          android {
              namespace 'eu.kanade.tachiyomi.extension.ko.ntk'
              compileSdk 34
              defaultConfig {
                  minSdk 21
                  targetSdk 34
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          EOF

      - name: Build NTK Debug APK
        run: ./gradlew :src:ko:ntk:assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ntk-plugin-apk
          path: "**/*.apk"
